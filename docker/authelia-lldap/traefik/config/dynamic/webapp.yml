http:
  routers:
    webapp-router:
      rule: 'Host(`webapp.example.com`)'  # any hosts
      entrypoints:
        - https
      middlewares:
      - authelia@docker
      service: webapp-service
  services:
    webapp-service:
      loadBalancer:
        servers:
          - url: 'http://host.docker.internal:3000/'
  middlewares:
    authelia:
      forwardAuth:
        address: 'https://authelia:9091/api/authz/forward-auth'
        trustForwardHeader: true
        authResponseHeaders:
          - 'Remote-User'
          - 'Remote-Groups'
          - 'Remote-Email'
          - 'Remote-Name'